<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="initial-scale=1.0, width=device-width" />
<title>Email Form</title>
<script src="/scripts/contact-form.js" defer></script>
</head>
<body>
<form name="contactform" method="post" action="#" data-contact-form>
<table width="450px">
<tr>
  <td valign="top">
   <label for="first_name">First Name *</label>
  </td>
  <td valign="top">
   <input type="text" name="first_name" maxlength="50" size="30" required>
  </td>
</tr>
<tr>
  <td valign="top">
   <label for="last_name">Last Name *</label>
  </td>
  <td valign="top">
   <input type="text" name="last_name" maxlength="50" size="30" required>
  </td>
</tr>
<tr>
  <td valign="top">
   <label for="email">Email Address *</label>
  </td>
  <td valign="top">
   <input type="email" name="email" maxlength="80" size="30" required>
  </td>
</tr>
<tr>
  <td valign="top">
   <label for="telephone">Telephone Number</label>
  </td>
  <td valign="top">
   <input type="text" name="telephone" maxlength="30" size="30">
  </td>
</tr>
<tr>
  <td valign="top">
   <label for="comments">Comments *</label>
  </td>
  <td valign="top">
   <textarea name="comments" maxlength="1000" cols="25" rows="6" required></textarea>
  </td>
</tr>
<tr>
  <td colspan="2" style="text-align:center">
   <input type="submit" value="Submit">
  </td>
</tr>
</table>
</form>
<br/>
* These fields are required
</body>
</html>
